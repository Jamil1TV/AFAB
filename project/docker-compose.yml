services:
  # ── PostgreSQL 16 ──────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: afab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MinIO (S3-Compatible Receipt Storage) ──────
  minio:
    image: minio/minio:latest
    container_name: afab-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Mailpit (Local Email Testing) ──────────────
  mailpit:
    image: axllent/mailpit:latest
    container_name: afab-mailpit
    restart: unless-stopped
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8025/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Redis (Optional Cache) ─────────────────────
  redis:
    image: redis:7-alpine
    container_name: afab-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── AFAB Backend (Spring Boot 4.1) ─────────────
  afab-backend:
    image: maven:3.9.9-eclipse-temurin-21
    container_name: afab-backend
    working_dir: /workspace/backend
    command:
      - mvn
      - -B
      - -DskipTests
      - spring-boot:run
      - -Dspring-boot.run.profiles=local
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
      MINIO_ENDPOINT: http://minio:9000
      MAIL_HOST: mailpit
      REDIS_HOST: redis
      DEBUG: "true"
    ports:
      - "${SERVER_PORT:-8080}:8080"
    volumes:
      - ./backend:/workspace/backend
      - ./contracts:/workspace/contracts:ro
      - maven_cache:/root/.m2
      - backend_target:/workspace/backend/target
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailpit:
        condition: service_healthy
    init: true

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  redis_data:
    driver: local
  maven_cache:
    driver: local
  backend_target:
    driver: local
