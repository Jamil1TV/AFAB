openapi: 3.0.1
info:
  title: AFAB Identity & Auth API
  version: 1.0.0
  description: OpenAPI specification for the Authentication and Identity module of AFAB.
servers:
  - url: http://localhost:8080
paths:
  /api/v1/auth/register:
    post:
      summary: Register a new user and business
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Successfully registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request (e.g., email already exists)
        '429':
          description: Rate limit exceeded
  /api/v1/auth/login:
    post:
      summary: Authenticate a user
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successfully authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
        '429':
          description: Rate limit exceeded
  /api/v1/auth/refresh:
    post:
      summary: Refresh an access token
      operationId: refresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Successfully refreshed token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '403':
          description: Invalid or expired refresh token
  /api/v1/auth/logout:
    post:
      summary: Logout and revoke refresh token
      operationId: logout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefreshRequest'
      responses:
        '200':
          description: Successfully logged out

  /api/v1/auth/verify-email:
    post:
      summary: Verify user email using OTP
      operationId: verifyEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyEmailRequest'
      responses:
        '200':
          description: Email successfully verified
        '400':
          description: Invalid or expired verification code

  /api/v1/auth/resend-verification:
    post:
      summary: Resend email verification OTP
      operationId: resendVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResendVerificationRequest'
      responses:
        '200':
          description: Verification email sent
        '400':
          description: User not found or email already verified
        '429':
          description: Rate limit exceeded

  /api/v1/auth/forgot-password:
    post:
      summary: Request password reset OTP
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Password reset email sent (if email exists)
        '429':
          description: Rate limit exceeded

  /api/v1/auth/reset-password:
    post:
      summary: Reset password using OTP
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password successfully reset
        '400':
          description: Invalid or expired reset code
        '429':
          description: Rate limit exceeded

  /api/v1/business/{id}:
    get:
      summary: Get business details
      operationId: getBusiness
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Business details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessDTO'
        '403':
          description: Forbidden
    put:
      summary: Update business onboarding details
      operationId: updateBusiness
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateBusinessRequest'
      responses:
        '200':
          description: Updated business details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BusinessDTO'
        '403':
          description: Forbidden

  /api/v1/user/me:
    get:
      summary: Get current user profile
      operationId: getCurrentUser
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfileDTO'
        '401':
          description: Unauthorized

components:
  schemas:
    RegisterRequest:
      type: object
      required:
        - firstName
        - lastName
        - email
        - password
        - businessName
      properties:
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        businessName:
          type: string
          
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          
    TokenRefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          
    VerifyEmailRequest:
      type: object
      required:
        - email
        - code
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6

    ResendVerificationRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ForgotPasswordRequest:
      type: object
      required:
        - email
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required:
        - email
        - code
        - newPassword
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          minLength: 6
          maxLength: 6
        newPassword:
          type: string
          minLength: 8
          
    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          $ref: '#/components/schemas/UserDto'
          
    UserDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        avatarUrl:
          type: string
        businessId:
          type: string
          format: uuid
        emailVerified:
          type: boolean
        onboardingComplete:
          type: boolean

    UpdateBusinessRequest:
      type: object
      required:
        - country
        - currency
        - timezone
      properties:
        country:
          type: string
        currency:
          type: string
          minLength: 3
          maxLength: 3
        timezone:
          type: string
        fiscalYearStartMonth:
          type: integer
        industry:
          type: string
        businessType:
          type: string

    BusinessDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        country:
          type: string
        currency:
          type: string
        timezone:
          type: string
        fiscalYearStartMonth:
          type: integer
        industry:
          type: string
        businessType:
          type: string
        status:
          type: string
        onboardingComplete:
          type: boolean

    UserProfileDTO:
      type: object
      properties:
        id:
          type: string
          format: uuid
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phoneNumber:
          type: string
        avatarUrl:
          type: string
        emailVerified:
          type: boolean
        businessId:
          type: string
          format: uuid
        businessName:
          type: string
        currency:
          type: string
        country:
          type: string
        onboardingComplete:
          type: boolean
        createdAt:
          type: string
          format: date-time
