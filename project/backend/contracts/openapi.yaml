openapi: 3.1.0
info:
  title: AFAB API
  description: |
    **AI Finance Assistant for Business** — REST API Contract

    AFAB is a modern SaaS platform designed to help small businesses manage
    their finances through a clean, intuitive, and data-driven experience.

    ## Authentication
    All endpoints (except `/auth/**`) require a valid JWT Bearer token in
    the `Authorization` header. Tokens are obtained via `/auth/login` or
    `/auth/register`.

    ## Versioning
    All endpoints are versioned under `/api/v1`.

    ## Response Format
    Every response is wrapped in a standard `ApiResponse` envelope:
    ```json
    {
      "success": true,
      "message": "optional message",
      "data": { ... },
      "timestamp": "2026-07-15T22:00:00Z"
    }
    ```
  version: 1.0.0
  contact:
    name: AFAB Team
    email: team@afab.local
  license:
    name: Proprietary

servers:
  - url: http://localhost:8080
    description: Local Development

tags:
  - name: Auth
    description: Authentication & account management
  - name: Profile
    description: User profile management
  - name: Business
    description: Business settings
  - name: Settings
    description: User preferences
  - name: Dashboard
    description: Dashboard summaries & charts
  - name: Categories
    description: Income/expense categories
  - name: Income
    description: Income management
  - name: Expenses
    description: Expense management
  - name: Budgets
    description: Budget management
  - name: Goals
    description: Savings goals
  - name: Investments
    description: Manual investment tracking
  - name: Reports
    description: Financial reports & export
  - name: Notifications
    description: System notifications
  - name: Assistant
    description: AI Assistant (placeholder, disabled in V1)

# ═══════════════════════════════════════════════════
# PATHS
# ═══════════════════════════════════════════════════
paths:

  # ── Auth ──────────────────────────────────────────
  /api/v1/auth/register:
    post:
      operationId: register
      tags: [Auth]
      summary: Register a new user account
      description: Creates a new user and their business. Returns JWT tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/login:
    post:
      operationId: login
      tags: [Auth]
      summary: Authenticate user
      description: Validates credentials and returns JWT access + refresh tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      operationId: refreshToken
      tags: [Auth]
      summary: Refresh access token
      description: Uses a valid refresh token to issue a new access token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/logout:
    post:
      operationId: logout
      tags: [Auth]
      summary: Logout
      description: Revokes the refresh token.
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageEnvelope'

  /api/v1/auth/user:
    get:
      operationId: getCurrentUser
      tags: [Auth]
      summary: Get authenticated user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponseEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [Auth]
      summary: Request password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
      responses:
        '200':
          description: Reset email sent (always returns 200 to prevent email enumeration)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageEnvelope'

  /api/v1/auth/reset-password:
    post:
      operationId: resetPassword
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/email/verification-notification:
    post:
      operationId: resendVerificationEmail
      tags: [Auth]
      summary: Resend email verification
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Verification email sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageEnvelope'

  /api/v1/auth/email/verify/{id}/{hash}:
    get:
      operationId: verifyEmail
      tags: [Auth]
      summary: Verify email address
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageEnvelope'
        '400':
          $ref: '#/components/responses/BadRequest'

  # ── Profile ───────────────────────────────────────
