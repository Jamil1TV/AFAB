# ═══════════════════════════════════════════════════
# COMPONENTS
# ═══════════════════════════════════════════════════
components:

  # ── Security ────────────────────────────────────
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token

  # ── Parameters ──────────────────────────────────
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0
    SizeParam:
      name: size
      in: query
      schema:
        type: integer
        default: 20
        minimum: 1
        maximum: 100
    SortParam:
      name: sort
      in: query
      schema:
        type: string
        example: createdAt,desc
    SearchParam:
      name: search
      in: query
      schema:
        type: string
    MonthParam:
      name: month
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
        maximum: 12
    YearParam:
      name: year
      in: query
      required: true
      schema:
        type: integer
        minimum: 2020
    MonthsParam:
      name: months
      in: query
      schema:
        type: integer
        default: 6
        minimum: 1
        maximum: 24
    CategoryIdParam:
      name: categoryId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    IncomeIdParam:
      name: incomeId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ExpenseIdParam:
      name: expenseId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BudgetIdParam:
      name: budgetId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    GoalIdParam:
      name: goalId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    InvestmentIdParam:
      name: investmentId
      in: path
      required: true
      schema:
        type: integer
        format: int64
    NotificationIdParam:
      name: notificationId
      in: path
      required: true
      schema:
        type: integer
        format: int64

  # ── Responses ───────────────────────────────────
  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    ValidationError:
      description: Validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiErrorWithValidation'

  # ── Schemas ─────────────────────────────────────
  schemas:

    # ── Envelope wrappers ───────────────────────
    ApiError:
      type: object
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
        timestamp:
          type: string
          format: date-time

    ApiErrorWithValidation:
      allOf:
        - $ref: '#/components/schemas/ApiError'
        - type: object
          properties:
            validationErrors:
              type: object
              additionalProperties:
                type: string

    MessageEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        timestamp:
          type: string
          format: date-time

    # ── Auth ────────────────────────────────────
    RegisterRequest:
      type: object
      required: [name, email, password, businessName]
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          example: Farouk
        email:
          type: string
          format: email
          example: farouk@afab.local
        password:
          type: string
          format: password
          minLength: 8
          maxLength: 128
        businessName:
          type: string
          minLength: 2
          maxLength: 200
          example: My Coffee Shop
        currency:
          type: string
          minLength: 3
          maxLength: 3
          default: USD
          example: USD

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [token, password, passwordConfirmation]
      properties:
        token:
          type: string
        password:
          type: string
          format: password
          minLength: 8
        passwordConfirmation:
          type: string
          format: password

    AuthResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        tokenType:
          type: string
          default: Bearer
        expiresIn:
          type: integer
          format: int64
          description: Access token expiration in milliseconds

    AuthResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        data:
          $ref: '#/components/schemas/AuthResponse'
        timestamp:
          type: string
          format: date-time

    # ── User ────────────────────────────────────
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        email:
          type: string
          format: email
        emailVerifiedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time

    UserResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/UserResponse'
        timestamp:
          type: string
          format: date-time

    UpdateProfileRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
        email:
          type: string
          format: email

    ChangePasswordRequest:
      type: object
      required: [currentPassword, newPassword, newPasswordConfirmation]
      properties:
        currentPassword:
          type: string
          format: password
        newPassword:
          type: string
          format: password
          minLength: 8
        newPasswordConfirmation:
          type: string
          format: password

    # ── Business ────────────────────────────────
    BusinessResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        currency:
          type: string
        country:
          type: string
          nullable: true
        timezone:
          type: string
        fiscalYearStartMonth:
          type: integer
        createdAt:
          type: string
          format: date-time

    BusinessResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/BusinessResponse'
        timestamp:
          type: string
          format: date-time

    UpdateBusinessRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 200
        currency:
          type: string
          minLength: 3
          maxLength: 3
        country:
          type: string
        timezone:
          type: string
        fiscalYearStartMonth:
          type: integer
          minimum: 1
          maximum: 12

    # ── Settings ────────────────────────────────
    SettingsResponse:
      type: object
      properties:
        darkMode:
          type: boolean
        locale:
          type: string
        notificationPreferences:
          type: object

    SettingsResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/SettingsResponse'
        timestamp:
          type: string
          format: date-time

    UpdateSettingsRequest:
      type: object
      properties:
        darkMode:
          type: boolean
        locale:
          type: string
        notificationPreferences:
          type: object

    # ── Category ────────────────────────────────
    CategoryRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          maxLength: 100
        type:
          type: string
          enum: [income, expense]
        color:
          type: string
          pattern: '^#[0-9A-Fa-f]{6}$'
        icon:
          type: string

    CategoryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          type: string
          enum: [income, expense]
        color:
          type: string
          nullable: true
        icon:
          type: string
          nullable: true
        isDefault:
          type: boolean
        createdAt:
          type: string
          format: date-time

    CategoryResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/CategoryResponse'
        timestamp:
          type: string
          format: date-time

    CategoryListEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/CategoryResponse'
        timestamp:
          type: string
          format: date-time

    # ── Income ──────────────────────────────────
    IncomeRequest:
      type: object
      required: [title, amount, receivedAt]
      properties:
        title:
          type: string
          maxLength: 200
        amount:
          type: number
          format: double
          minimum: 0.01
        receivedAt:
          type: string
          format: date-time
        categoryId:
          type: integer
          format: int64
          nullable: true
        source:
          type: string
          maxLength: 200
        notes:
          type: string
        isRecurring:
          type: boolean
          default: false
        recurringRule:
          $ref: '#/components/schemas/RecurringRuleRequest'

    RecurringRuleRequest:
      type: object
      properties:
        frequency:
          type: string
          enum: [daily, weekly, monthly, yearly]
        interval:
          type: integer
          default: 1
          minimum: 1
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
          nullable: true

    IncomeResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        amount:
          type: number
          format: double
        receivedAt:
          type: string
          format: date-time
        categoryId:
          type: integer
          format: int64
          nullable: true
        categoryName:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isRecurring:
          type: boolean
        createdAt:
          type: string
          format: date-time

    IncomeResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/IncomeResponse'
        timestamp:
          type: string
          format: date-time

    IncomePageEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/IncomePage'
        timestamp:
          type: string
          format: date-time

    IncomePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/IncomeResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        first:
          type: boolean
        last:
          type: boolean

    # ── Expense ─────────────────────────────────
    ExpenseRequest:
      type: object
      required: [title, amount, spentAt]
      properties:
        title:
          type: string
          maxLength: 200
        amount:
          type: number
          format: double
          minimum: 0.01
        spentAt:
          type: string
          format: date-time
        categoryId:
          type: integer
          format: int64
          nullable: true
        merchant:
          type: string
          maxLength: 200
        paymentMethod:
          type: string
          maxLength: 50
        notes:
          type: string
        isRecurring:
          type: boolean
          default: false
        recurringRule:
          $ref: '#/components/schemas/RecurringRuleRequest'

    ExpenseResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        amount:
          type: number
          format: double
        spentAt:
          type: string
          format: date-time
        categoryId:
          type: integer
          format: int64
          nullable: true
        categoryName:
          type: string
          nullable: true
        merchant:
          type: string
          nullable: true
        paymentMethod:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        isRecurring:
          type: boolean
        hasReceipt:
          type: boolean
        createdAt:
          type: string
          format: date-time

    ExpenseResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/ExpenseResponse'
        timestamp:
          type: string
          format: date-time

    ExpensePageEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/ExpensePage'
        timestamp:
          type: string
          format: date-time

    ExpensePage:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer
        first:
          type: boolean
        last:
          type: boolean

    # ── Budget ──────────────────────────────────
    BudgetRequest:
      type: object
      required: [name, amount, period, startsAt]
      properties:
        name:
          type: string
          maxLength: 200
        amount:
          type: number
          format: double
          minimum: 0.01
        period:
          type: string
          enum: [monthly, yearly, custom]
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
          nullable: true
        categoryId:
          type: integer
          format: int64
          nullable: true
        alertThresholdPercent:
          type: integer
          default: 80
          minimum: 1
          maximum: 100

    BudgetResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        amount:
          type: number
          format: double
        spent:
          type: number
          format: double
          description: Total spent against this budget
        remaining:
          type: number
          format: double
        percentUsed:
          type: number
          format: double
        period:
          type: string
          enum: [monthly, yearly, custom]
        startsAt:
          type: string
          format: date-time
        endsAt:
          type: string
          format: date-time
          nullable: true
        categoryId:
          type: integer
          format: int64
          nullable: true
        categoryName:
          type: string
          nullable: true
        alertThresholdPercent:
          type: integer
        createdAt:
          type: string
          format: date-time

    BudgetResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/BudgetResponse'
        timestamp:
          type: string
          format: date-time

    BudgetListEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/BudgetResponse'
        timestamp:
          type: string
          format: date-time

    # ── Savings Goal ────────────────────────────
    GoalRequest:
      type: object
      required: [name, targetAmount]
      properties:
        name:
          type: string
          maxLength: 200
        targetAmount:
          type: number
          format: double
          minimum: 0.01
        currentAmount:
          type: number
          format: double
          default: 0
        deadline:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, completed, paused]
          default: active

    GoalResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        targetAmount:
          type: number
          format: double
        currentAmount:
          type: number
          format: double
        percentComplete:
          type: number
          format: double
        deadline:
          type: string
          format: date-time
          nullable: true
        status:
          type: string
          enum: [active, completed, paused]
        createdAt:
          type: string
          format: date-time

    GoalResponseEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: '#/components/schemas/GoalResponse'
        timestamp:
          type: string
          format: date-time

    GoalListEnvelope:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: array
          items:
            $ref: '#/components/schemas/GoalResponse'
        timestamp:
          type: string
          format: date-time

    # ── Investment ──────────────────────────────
    InvestmentRequest:
      type: object
      required: [name, type, investedAmount]
      properties:
        name:
          type: string
          maxLength: 200
        type:
          type: string
          enum: [stock, crypto, fund, real_estate, other]
        quantity:
          type: number
          format: double
          nullable: true
        purchasePrice:
          type: number
          format: double
          nullable: true
        currentValue:
          type: number
          format: double
          nullable: true
        investedAmount:
          type: number
          format: double
          minimum: 0
        notes:
          type: string

    InvestmentResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          type: string
          enum: [stock, crypto, fund, real_estate, other]
        quantity:
          type: number
          format: double
